# =============================================================================
# koe-tts Path Configuration
# =============================================================================
#
# Two-tier storage:
#   - data_root (G: drive): Archive/cold storage for completed runs, checkpoints
#   - local_root (WSL): Hot storage for active training (fast SSD I/O)
#
# Workflow:
#   1. Training starts -> clone checkpoint from archive to local
#   2. Training runs locally (fast I/O)
#   3. Training ends -> archive run to G:, clear local
#
# Override order:
#   1. KOE_DATA_ROOT / KOE_LOCAL_ROOT environment variables (highest priority)
#   2. This config file
#   3. Default: repo root (lowest priority)
#
# Structure under DATA_ROOT (archive):
#   data/         # Downloaded corpus, assets, derived
#   lake/         # Delta tables (bronze, silver, gold)
#   runs/         # Archived training runs (completed)
#   models/       # Curated model registry
#
# Structure under LOCAL_ROOT (working):
#   runs/         # Active training runs (fast local storage)
#   cache/        # Training data cache (optional, for faster loading)
#
# =============================================================================

# Archive storage (large, slower - NAS or external drive)
# Override with KOE_DATA_ROOT environment variable
data_root: ${KOE_DATA_ROOT:-.}

# Local working storage (fast SSD for active training)
# Override with KOE_LOCAL_ROOT environment variable
local_root: ${KOE_LOCAL_ROOT:-.}

# Examples:
#   export KOE_DATA_ROOT=/mnt/nas/koe-tts
#   export KOE_LOCAL_ROOT=$HOME/koe-tts
